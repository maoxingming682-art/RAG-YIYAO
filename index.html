<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药业智能咨询助手</title>
    <script>
        (function normalizeLocalEntry() {
            if (window.location.protocol === 'file:') {
                window.location.replace('http://localhost:5006/');
                return;
            }
            if (window.location.hostname === '0.0.0.0') {
                window.location.replace(`http://localhost:5006${window.location.pathname}${window.location.search}${window.location.hash}`);
            }
        })();
    </script>
    <style>
        :root {
            --sidebar: #f3f6f9;
            --sidebar-strong: #e4e9ef;
            --surface: #ffffff;
            --surface-soft: #f7f8fa;
            --line: #e6e8ec;
            --line-strong: #d6dbe2;
            --text: #20242a;
            --muted: #727984;
            --faint: #a2a8b1;
            --accent: #f05a28;
            --accent-soft: #fff0e8;
            --blue: #4b7bec;
            --success: #2f9e6d;
            --shadow: 0 18px 48px rgba(30, 41, 59, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            background: var(--surface);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        button, textarea, select { font: inherit; }
        button { color: inherit; }

        .app-shell {
            display: grid;
            grid-template-columns: 298px minmax(0, 1fr);
            height: 100vh;
            width: 100vw;
            background: var(--surface);
        }

        .sidebar {
            position: relative;
            display: flex;
            min-width: 0;
            flex-direction: column;
            background: var(--sidebar);
            border-right: 1px solid var(--line-strong);
            color: #333941;
        }

        .desktop-menu {
            display: flex;
            align-items: center;
            gap: 16px;
            height: 34px;
            padding: 0 12px;
            color: #6d747d;
            font-size: 13px;
            white-space: nowrap;
        }

        .window-dot {
            display: inline-flex;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            border: 1px solid #aeb8c3;
            border-radius: 4px;
        }

        .menu-arrow {
            border: 0;
            background: transparent;
            color: #aeb6c0;
            cursor: default;
            padding: 0;
        }

        .side-scroll {
            min-height: 0;
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px 84px;
        }

        .nav-group { display: grid; gap: 2px; margin-bottom: 24px; }

        .nav-button,
        .project-button,
        .history-button {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 10px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            padding: 8px 7px;
            text-align: left;
            color: #2f3740;
            cursor: pointer;
        }

        .nav-button:hover,
        .project-button:hover,
        .history-button:hover { background: rgba(255, 255, 255, 0.55); }

        .nav-button svg,
        .project-button svg,
        .history-button svg,
        .suggestion-row svg,
        .link-icon svg {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
            stroke-width: 1.8;
        }

        .section-label {
            margin: 20px 7px 8px;
            color: #8a929c;
            font-size: 13px;
        }

        .project-button {
            justify-content: space-between;
            gap: 8px;
            font-size: 14px;
        }

        .project-main {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 10px;
        }

        .project-title,
        .history-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-sub {
            display: block;
            margin: 0 0 7px 38px;
            color: #a1a8b0;
            font-size: 13px;
        }

        .project-button.active { background: rgba(255, 255, 255, 0.68); }
        .project-time { flex: 0 0 auto; color: #8b939c; font-size: 13px; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin: 10px 6px 4px;
        }

        .metric {
            border: 1px solid rgba(190, 202, 214, 0.8);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.42);
            padding: 9px 10px;
        }

        .metric-value {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 16px;
            font-weight: 650;
        }

        .metric-label {
            margin-top: 3px;
            color: #8b939c;
            font-size: 12px;
        }

        .history-list {
            display: grid;
            gap: 2px;
            margin: 4px 0 10px;
        }

        .history-button {
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            padding: 8px 7px;
        }

        .history-top {
            display: flex;
            min-width: 0;
            width: 100%;
            align-items: center;
            gap: 8px;
            color: #343b43;
            font-size: 14px;
        }

        .history-meta {
            margin-left: 24px;
            color: #9aa2ac;
            font-size: 12px;
        }

        .empty-history {
            margin: 2px 7px;
            color: #9aa2ac;
            font-size: 13px;
            line-height: 1.6;
        }

        .sidebar-footer {
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--line-strong);
            background: rgba(243, 246, 249, 0.96);
            padding: 12px 16px;
        }

        .settings-dot {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #eee9ff;
            color: #7c3aed;
        }

        .settings-title { font-size: 14px; font-weight: 600; }
        .settings-sub { color: #8c949e; font-size: 12px; }

        .workspace {
            position: relative;
            display: flex;
            min-width: 0;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
            background: var(--surface);
        }

        .workspace-tools {
            position: absolute;
            top: 15px;
            right: 17px;
            z-index: 5;
            display: flex;
            gap: 8px;
        }

        .tool-button {
            display: inline-flex;
            width: 28px;
            height: 28px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: #8b929c;
            cursor: pointer;
        }

        .tool-button:hover { background: var(--surface-soft); color: #4b5563; }
        .tool-button svg { width: 16px; height: 16px; }

        .landing {
            display: flex;
            min-height: 100%;
            align-items: center;
            justify-content: center;
            padding: 34px 28px;
        }

        .landing-inner {
            width: min(730px, 100%);
            transform: translateY(-20px);
        }

        .landing h1 {
            margin: 0 0 42px;
            text-align: center;
            color: #24262a;
            font-size: clamp(24px, 3vw, 30px);
            font-weight: 500;
            letter-spacing: 0;
        }

        .composer {
            width: 100%;
        }

        .composer-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .input-area {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 78px;
            padding: 14px 12px 0;
        }

        #inputBox {
            width: 100%;
            min-height: 46px;
            max-height: 168px;
            resize: none;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
        }

        #inputBox::placeholder { color: #b1b6bd; }

        .composer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 8px 9px 10px;
        }

        .left-actions,
        .right-actions {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 9px;
        }

        .icon-button {
            display: inline-flex;
            width: 30px;
            height: 30px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 9px;
            background: transparent;
            color: #8d949e;
            cursor: pointer;
        }

        .icon-button:hover { background: var(--surface-soft); color: #5b626c; }
        .icon-button svg { width: 18px; height: 18px; }

        .access-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 0;
            background: transparent;
            color: var(--accent);
            font-size: 12px;
            font-weight: 650;
        }

        .model-select {
            max-width: 132px;
            border: 0;
            background: transparent;
            color: #4b5563;
            font-size: 12px;
            outline: 0;
        }

        .send-button {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            background: #8f9399;
            color: #fff;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
        }

        .send-button:hover { background: #686d75; }
        .send-button:disabled { cursor: not-allowed; opacity: 0.7; }
        .send-button svg { width: 18px; height: 18px; }

        .composer-context {
            display: flex;
            min-height: 42px;
            align-items: center;
            gap: 18px;
            border-radius: 0 0 20px 20px;
            background: #f5f5f5;
            padding: 8px 16px;
            color: #6f7782;
            font-size: 12px;
        }

        .context-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .context-item svg { width: 14px; height: 14px; }

        .suggestions {
            margin-top: 18px;
            overflow: hidden;
            border-top: 1px solid transparent;
        }

        .suggestion-row {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 8px;
            border: 0;
            border-top: 1px solid var(--line);
            background: transparent;
            padding: 11px 13px;
            color: #8b929c;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
        }

        .suggestion-row:hover { color: #58606b; background: #fafafa; }

        .chat-panel {
            display: none;
            position: absolute;
            inset: 0;
            overflow-y: auto;
            background: #fff;
            padding: 76px 28px 230px;
        }

        .chat-inner {
            width: min(850px, 100%);
            margin: 0 auto;
        }

        body.chat-started .landing { display: none; }
        body.chat-started .chat-panel { display: block; }
        .composer-dock {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 4;
            width: min(730px, calc(100% - 56px));
            transform: translate(-50%, -50%);
            margin-top: 48px;
        }

        body.chat-started .composer-dock {
            position: fixed;
            right: 0;
            bottom: 0;
            left: 298px;
            top: auto;
            z-index: 30;
            width: auto;
            transform: none;
            margin-top: 0;
            padding: 18px 28px 24px;
            background: linear-gradient(to top, #fff 82%, rgba(255, 255, 255, 0));
        }

        body.chat-started .composer {
            width: min(850px, 100%);
            margin: 0 auto;
        }

        body.chat-started .suggestions { display: none; }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            display: inline-flex;
            width: 30px;
            height: 30px;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #eef2f7;
            color: #5d6672;
            font-size: 12px;
            font-weight: 700;
        }

        .message.user .avatar { order: 2; background: #f1f4f8; }

        .bubble {
            max-width: min(680px, calc(100vw - 420px));
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            padding: 13px 15px;
            color: #282d33;
            font-size: 14px;
            line-height: 1.75;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
        }

        .message.user .bubble {
            border-color: #e0e5ec;
            background: #fff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
        }

        .message.assistant .bubble {
            border-color: transparent;
            background: transparent;
            box-shadow: none;
        }

        .message-actions {
            display: flex;
            align-items: flex-start;
            padding-top: 3px;
        }

        .copy-button {
            display: inline-flex;
            width: 26px;
            height: 26px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: #a1a8b0;
            cursor: pointer;
        }

        .copy-button:hover { background: var(--surface-soft); color: #5e6670; }
        .copy-button svg { width: 15px; height: 15px; }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f8fafc;
            padding: 2px 8px;
            color: #69717d;
            font-size: 12px;
            line-height: 1.5;
        }

        .badge.safe { border-color: #dce8e1; background: #fbfdfc; color: #4f6559; }
        .badge.warn { border-color: #f1dcc2; background: #fffaf4; color: #8a5b2b; }
        .badge.danger { border-color: #ebc6cb; background: #fff7f7; color: #9f2532; }

        .trace {
            margin-top: 10px;
            border-top: 1px solid var(--line);
            padding-top: 8px;
            color: #8a929c;
            font-size: 12px;
        }

        .typing {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 48px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: #7f8792;
            animation: typing-bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0.32s; }

        @keyframes typing-bounce {
            0%, 70%, 100% { transform: translateY(0); opacity: 0.45; }
            35% { transform: translateY(-5px); opacity: 1; }
        }

        .toast {
            pointer-events: none;
            position: fixed;
            left: 50%;
            bottom: 88px;
            z-index: 20;
            transform: translateX(-50%) translateY(8px);
            border: 1px solid #d7dce3;
            border-radius: 10px;
            background: #22262b;
            padding: 9px 12px;
            color: #fff;
            font-size: 13px;
            opacity: 0;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
            transition: opacity 0.18s, transform 0.18s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .mobile-topbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            padding: 10px 14px;
        }

        .mobile-title { font-size: 14px; font-weight: 650; }

        @media (max-width: 980px) {
            body { overflow: auto; }
            .app-shell { display: block; height: 100vh; }
            .sidebar { display: none; }
            .mobile-topbar { display: flex; }
            .workspace { height: 100vh; }
            .workspace-tools { display: none; }
            .landing { min-height: calc(100vh - 49px); padding: 22px 14px; }
            .landing-inner { transform: none; }
            .landing h1 { margin-bottom: 24px; font-size: 24px; }
            .composer-context { flex-wrap: wrap; gap: 9px; }
            .chat-panel { padding: 22px 14px 176px; }
            .bubble { max-width: min(680px, calc(100vw - 74px)); }
            body.chat-started .composer-dock { left: 0; padding: 12px 14px 16px; }
        }

        @media (max-width: 560px) {
            .composer-actions { align-items: flex-end; }
            .right-actions { gap: 4px; }
            .model-select { display: none; }
            .access-chip span { display: none; }
            .suggestions { margin-top: 12px; }
            .suggestion-row { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="voiceUnavailableToast" class="toast" aria-live="polite" aria-hidden="true">当前麦克风无法使用</div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="desktop-menu">
                <span class="window-dot" aria-hidden="true"></span>
                <button class="menu-arrow" type="button" aria-label="后退">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="menu-arrow" type="button" aria-label="前进">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <span>文件</span>
                <span>编辑</span>
                <span>视图</span>
                <span>帮助</span>
            </div>

            <div class="side-scroll">
                <div class="nav-group">
                    <button class="nav-button" type="button" onclick="resetConversation()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
                        新对话
                    </button>
                    <button class="nav-button" type="button" onclick="inputBox.focus()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
                        搜索
                    </button>
                    <a class="nav-button" href="/admin/rag-logs" style="text-decoration:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 7h8M8 12h8M8 17h5"/><rect x="4" y="4" width="16" height="16" rx="3"/></svg>
                        已安排
                    </a>
                    <a class="nav-button" href="/forecast" style="text-decoration:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19V5M4 19h16"/><path d="M8 15l3-3 3 2 5-7"/></svg>
                        插件
                    </a>
                </div>

                <div class="section-label">项目</div>
                <button class="project-button active" type="button" onclick="resetConversation()">
                    <span class="project-main">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 7h8M8 12h8M8 17h4"/><rect x="5" y="3" width="14" height="18" rx="2"/></svg>
                        <span class="project-title">RAG试跑</span>
                    </span>
                    <span class="project-time">当前</span>
                </button>
                <span class="project-sub">药学咨询和多轮测试</span>

                <a class="project-button" href="/forecast" style="text-decoration:none">
                    <span class="project-main">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19h16M7 16V9M12 16V5M17 16v-4"/></svg>
                        <span class="project-title">库存预测</span>
                    </span>
                    <span class="project-time">看板</span>
                </a>
                <span class="project-sub">SKU补货动作清单</span>

                <a class="project-button" href="/store-forecast" style="text-decoration:none">
                    <span class="project-main">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 10h16M6 10v9h12v-9"/><path d="M8 10V5h8v5"/></svg>
                        <span class="project-title">门店预测</span>
                    </span>
                    <span class="project-time">门店级</span>
                </a>
                <span class="project-sub">门店-SKU销售预测</span>

                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value" id="metricChunks">--</div>
                        <div class="metric-label">知识块</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metricApis">--</div>
                        <div class="metric-label">API</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metricTurns">0</div>
                        <div class="metric-label">轮对话</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metricTopic">--</div>
                        <div class="metric-label">当前主题</div>
                    </div>
                </div>

                <div class="section-label">最近上下文</div>
                <div class="history-list" id="contextStack">
                    <div class="empty-history">暂无对话</div>
                </div>

                <div class="section-label">快速入口</div>
                <button class="project-button" type="button" onclick="askQuick('我忘记之前做到什么地步了，怎么办？')">
                    <span class="project-main">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
                        <span class="project-title">继续上次试跑</span>
                    </span>
                </button>
                <button class="project-button" type="button" onclick="askQuick('根据知识库，眼睛干涩可以用什么？')">
                    <span class="project-main">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span class="project-title">药学问题样例</span>
                    </span>
                </button>
            </div>

            <div class="sidebar-footer">
                <span class="settings-dot">设</span>
                <div>
                    <div class="settings-title">设置</div>
                    <div class="settings-sub" id="statusBar">初始化中</div>
                </div>
            </div>
        </aside>

        <main class="workspace">
            <div class="mobile-topbar">
                <span class="mobile-title">RAG试跑</span>
                <button class="tool-button" type="button" onclick="resetConversation()" aria-label="新对话">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="workspace-tools" aria-label="页面工具">
                <button class="tool-button" type="button" title="RAG测试管理" onclick="location.href='/admin/rag-logs'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="5" width="14" height="14" rx="3"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
                </button>
                <button class="tool-button" type="button" title="库存预测" onclick="location.href='/forecast'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19V5M4 19h16M8 15l3-3 3 2 5-7"/></svg>
                </button>
            </div>

            <section class="landing" id="landing">
                <div class="landing-inner">
                    <h1>我们应该在 RAG试跑 中构建什么？</h1>
                </div>
            </section>

            <section class="chat-panel" id="chatContainer" aria-live="polite">
                <div class="chat-inner" id="chatInner"></div>
            </section>

            <div class="composer-dock" id="composerDock">
                <form class="composer" id="promptForm">
                    <div class="composer-card">
                        <div class="input-area">
                            <label for="inputBox" style="position:absolute;left:-9999px">输入问题</label>
                            <textarea id="inputBox" rows="1" placeholder="随心输入"></textarea>
                        </div>
                        <div class="composer-actions">
                            <div class="left-actions">
                                <button class="icon-button" type="button" title="补充说明" aria-label="补充说明">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
                                </button>
                                <button class="access-chip" type="button" title="访问范围">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>
                                    <span>完全访问</span>
                                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6"/></svg>
                                </button>
                            </div>
                            <div class="right-actions">
                                <select class="model-select" aria-label="模型">
                                    <option>GLM-5.2</option>
                                    <option>MiMo v2.5</option>
                                    <option>本地模式</option>
                                </select>
                                <button id="micBtn" class="icon-button" type="button" title="语音输入" aria-label="语音输入">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0z"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M8 21h8"/></svg>
                                </button>
                                <button id="sendBtn" class="send-button" type="submit" title="发送" aria-label="发送">
                                    <span id="sendIdle">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                                    </span>
                                    <span id="sendBusy" class="typing" style="display:none">
                                        <span class="typing-dot"></span>
                                        <span class="typing-dot"></span>
                                        <span class="typing-dot"></span>
                                    </span>
                                </button>
                            </div>
                        </div>
                        <div class="composer-context">
                            <span class="context-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="5" width="14" height="14" rx="3"/><path d="M8 9h8M8 13h8"/></svg>
                                RAG试跑
                            </span>
                            <span class="context-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 5h18v13H3z"/><path d="M8 21h8"/></svg>
                                本地模式
                            </span>
                            <span class="context-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 3v12"/><circle cx="6" cy="18" r="3"/><path d="M18 3v6"/><circle cx="18" cy="12" r="3"/></svg>
                                main
                            </span>
                            <span class="context-item" id="topbarHint">服务正在连接</span>
                        </div>
                    </div>
                </form>
                <div class="suggestions">
                    <button class="suggestion-row" type="button" onclick="askQuick('Fix the answer when the knowledge base is incomplete')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 12h8M12 8v8"/><rect x="4" y="4" width="16" height="16" rx="4"/></svg>
                        Fix the answer when the knowledge base is incomplete
                    </button>
                    <button class="suggestion-row" type="button" onclick="askQuick('Surface forecast lineage warnings in the admin page')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19h16M7 16V9M12 16V5M17 16v-4"/></svg>
                        Surface forecast lineage warnings in the admin page
                    </button>
                    <button class="suggestion-row" type="button" onclick="askQuick('将你常用的应用连接到 Codex')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l2-2a5 5 0 0 0-7.07-7.07l-1.14 1.14"/><path d="M14 11a5 5 0 0 0-7.54-.54l-2 2a5 5 0 0 0 7.07 7.07l1.14-1.14"/></svg>
                        将你常用的应用连接到 Codex
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInner = document.getElementById('chatInner');
        const promptForm = document.getElementById('promptForm');
        const inputBox = document.getElementById('inputBox');
        const micBtn = document.getElementById('micBtn');
        const voiceUnavailableToast = document.getElementById('voiceUnavailableToast');
        const sendBtn = document.getElementById('sendBtn');
        const sendIdle = document.getElementById('sendIdle');
        const sendBusy = document.getElementById('sendBusy');
        const statusBar = document.getElementById('statusBar');
        const topbarHint = document.getElementById('topbarHint');
        const contextStack = document.getElementById('contextStack');
        const metricTurns = document.getElementById('metricTurns');
        const metricTopic = document.getElementById('metricTopic');

        let chatHistory = [];
        let totalTurns = 0;
        let voiceToastTimer = null;

        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 168) + 'px';
        });

        inputBox.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuestion();
            }
        });

        promptForm.addEventListener('submit', (event) => {
            event.preventDefault();
            sendQuestion();
        });

        micBtn.addEventListener('click', showVoiceUnavailable);

        contextStack.addEventListener('click', (event) => {
            const item = event.target.closest('[data-question]');
            if (!item) return;
            askQuick(item.dataset.question || '');
        });

        function askQuick(question) {
            inputBox.value = question;
            inputBox.dispatchEvent(new Event('input'));
            sendQuestion();
        }

        function resetConversation() {
            chatHistory = [];
            totalTurns = 0;
            chatInner.innerHTML = '';
            document.body.classList.remove('chat-started');
            inputBox.value = '';
            inputBox.style.height = 'auto';
            updateContext();
            statusBar.textContent = '服务就绪';
            topbarHint.textContent = '已开启新对话';
            inputBox.focus();
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatText(text) {
            return escapeHtml(text)
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/(^|\n)\s*[-*]\s+/g, '$1• ')
                .replace(/\n/g, '<br>');
        }

        function triageClass(level) {
            if (level === '急症' || level === '重症') return 'danger';
            if (level === '中症') return 'warn';
            return 'safe';
        }

        function scrollToBottom() {
            window.requestAnimationFrame(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        function showVoiceUnavailable() {
            statusBar.textContent = '麦克风不可用';
            voiceUnavailableToast.classList.add('show');
            voiceUnavailableToast.setAttribute('aria-hidden', 'false');

            window.clearTimeout(voiceToastTimer);
            voiceToastTimer = window.setTimeout(() => {
                voiceUnavailableToast.classList.remove('show');
                voiceUnavailableToast.setAttribute('aria-hidden', 'true');
            }, 2200);
        }

        function setBusy(isBusy) {
            sendBtn.disabled = isBusy;
            sendIdle.style.display = isBusy ? 'none' : 'inline-flex';
            sendBusy.style.display = isBusy ? 'inline-flex' : 'none';
            if (isBusy) {
                statusBar.textContent = '生成中';
            } else if (statusBar.textContent === '生成中' || statusBar.textContent === '初始化中') {
                statusBar.textContent = '服务就绪';
            }
        }

        function copyText(text) {
            if (!navigator.clipboard || !text) return;
            navigator.clipboard.writeText(text).then(() => {
                statusBar.textContent = '已复制';
            }).catch(() => {
                statusBar.textContent = '复制失败';
            });
        }

        function assistantActions(textGetter) {
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-button';
            copyBtn.type = 'button';
            copyBtn.title = '复制';
            copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>';
            copyBtn.addEventListener('click', () => copyText(textGetter()));
            actions.appendChild(copyBtn);
            return actions;
        }

        function addMessage(role, text, extra = {}) {
            document.body.classList.add('chat-started');
            const isUser = role === 'user';
            const wrap = document.createElement('div');
            wrap.className = `message ${isUser ? 'user' : 'assistant'}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? 'U' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = buildBubbleHtml(text, extra);
            bubble.dataset.rawText = text || '';

            wrap.appendChild(avatar);
            wrap.appendChild(bubble);
            if (!isUser) wrap.appendChild(assistantActions(() => bubble.dataset.rawText || text || ''));
            chatInner.appendChild(wrap);
            scrollToBottom();
            return { wrap, bubble };
        }

        function buildBubbleHtml(text, extra = {}) {
            let html = '<div>';
            const badges = [];
            if (extra.triage && extra.triage.level) {
                const level = extra.triage.level;
                badges.push(`<span class="badge ${triageClass(level)}">分诊：${escapeHtml(level)}</span>`);
            }
            if (extra.retrieved && extra.retrieved.length > 0) {
                badges.push(`<span class="badge">检索：${extra.retrieved.length}条</span>`);
            }
            if (extra.issues && extra.issues.length > 0) {
                badges.push('<span class="badge warn">需复核</span>');
            }
            if (badges.length) html += `<div class="badges">${badges.join('')}</div>`;
            html += text
                ? `<div>${formatText(text)}</div>`
                : '<span class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
            if (extra.steps && extra.steps.length > 0) {
                html += `<div class="trace">${escapeHtml(extra.steps.join(' -> '))}</div>`;
            }
            html += '</div>';
            return html;
        }

        function updateContext() {
            metricTurns.textContent = String(totalTurns);
            const last = chatHistory[chatHistory.length - 1];
            if (!last) {
                metricTopic.textContent = '--';
                contextStack.innerHTML = '<div class="empty-history">暂无对话</div>';
                return;
            }
            const topic = extractTopic(last.question);
            metricTopic.textContent = topic || '追问';
            const items = chatHistory.slice(-5).reverse().map((item, index) => {
                const q = escapeHtml(item.question.length > 42 ? item.question.slice(0, 42) + '...' : item.question);
                const turn = totalTurns - index;
                return `
                    <button class="history-button" type="button" data-question="${escapeHtml(item.question)}">
                        <span class="history-top">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
                            <span class="history-title">${q}</span>
                        </span>
                        <span class="history-meta">第 ${turn} 轮</span>
                    </button>
                `;
            });
            contextStack.innerHTML = items.join('');
        }

        function extractTopic(text) {
            const cleaned = String(text || '')
                .replace(/怎么吃|怎么服用|有什么|不良反应|副作用|禁忌|注意事项|饭前|饭后|能吃吗|可以用吗|作用|相似|区别|吗|呢/g, '')
                .replace(/[，。！？、,.!?]/g, ' ')
                .trim();
            const match = cleaned.match(/[\u4e00-\u9fa5A-Za-z0-9]{2,12}/);
            return match ? match[0] : '';
        }

        async function sendQuestion() {
            const question = inputBox.value.trim();
            if (!question || sendBtn.disabled) return;

            addMessage('user', question);
            inputBox.value = '';
            inputBox.style.height = 'auto';
            setBusy(true);
            topbarHint.textContent = '正在处理本轮咨询';

            const assistant = addMessage('assistant', '', {});
            let answerText = '';
            let latestMeta = {};

            function renderAssistant() {
                assistant.bubble.innerHTML = buildBubbleHtml(answerText, latestMeta);
                assistant.bubble.dataset.rawText = answerText || latestMeta.answer || '';
                scrollToBottom();
            }

            try {
                const resp = await fetch('/api/ask_stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'text/event-stream'
                    },
                    cache: 'no-store',
                    body: JSON.stringify({ question, history: chatHistory })
                });

                if (!resp.ok || !resp.body) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();
                    for (const part of parts) {
                        const line = part.trim();
                        if (!line.startsWith('data: ')) continue;
                        const json = JSON.parse(line.slice(6));

                        if (json.type === 'meta') {
                            latestMeta = json.result || {};
                            renderAssistant();
                            if (latestMeta.steps && latestMeta.steps.length) {
                                statusBar.textContent = latestMeta.steps[latestMeta.steps.length - 1];
                            }
                        }

                        if (json.type === 'chunk') {
                            answerText += json.text || '';
                            renderAssistant();
                        }

                        if (json.type === 'done') {
                            if (json.result) latestMeta = json.result;
                            renderAssistant();
                            chatHistory.push({ question: latestMeta.question || question, answer: latestMeta.answer || answerText });
                            totalTurns += 1;
                            if (chatHistory.length > 5) chatHistory.shift();
                            updateContext();
                            statusBar.textContent = (latestMeta.issues && latestMeta.issues.length) ? '已标记复核' : '处理完成';
                        }

                        if (json.type === 'error') {
                            answerText += `\n\n处理出错：${json.error}`;
                            renderAssistant();
                            statusBar.textContent = '处理出错';
                        }
                    }
                }
            } catch (error) {
                answerText += `\n\n网络错误：${error.message}\n\n请确认当前地址是 http://localhost:5006，不要用 file:// 本地文件或 http://0.0.0.0:5006 打开。`;
                renderAssistant();
                statusBar.textContent = '网络错误';
            } finally {
                setBusy(false);
                topbarHint.textContent = '可以继续追问';
                inputBox.focus();
            }
        }

        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                if (data.vector_db) {
                    document.getElementById('metricChunks').textContent = String(data.chunks || '--');
                    document.getElementById('metricApis').textContent = String((data.apis || []).length || '--');
                    statusBar.textContent = '服务就绪';
                    topbarHint.textContent = `知识库 ${data.chunks} 块`;
                } else {
                    statusBar.textContent = '知识库未就绪';
                    topbarHint.textContent = '等待后端加载';
                }
            })
            .catch(() => {
                statusBar.textContent = '连接失败';
                topbarHint.textContent = '请用 http://localhost:5006 打开';
            });
    </script>
</body>
</html>
